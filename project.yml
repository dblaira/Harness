name: Harness
options:
  bundleIdPrefix: com.adamblair
  deploymentTarget:
    macOS: "14.0"
    iOS: "17.0"
  createIntermediateGroups: true

packages:
  OntologyKit:
    path: Packages/OntologyKit

targets:
  Harness:
    type: application
    supportedDestinations: [macOS, iOS]
    deploymentTarget:
      macOS: "14.0"
      iOS: "17.0"
    sources:
      - Sources/Harness
      - path: Sources/Harness/Fonts
        buildPhase: resources
    preBuildScripts:
      - name: Sync Canonical Ontology
        script: scripts/sync-ontology.sh
        basedOnDependencyAnalysis: false
    dependencies:
      - package: OntologyKit
    info:
      path: Generated/Info.plist
      properties:
        CFBundleDisplayName: Harness
        LSApplicationCategoryType: public.app-category.productivity
        UILaunchScreen:
          UIColorName: ""
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.adamblair.Harness
        CODE_SIGN_ENTITLEMENTS: Sources/Harness/Harness.entitlements
        GENERATE_INFOPLIST_FILE: YES
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        ENABLE_PREVIEWS: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        "CODE_SIGNING_ALLOWED[sdk=iphonesimulator*]": NO
        "CODE_SIGN_STYLE[sdk=macosx*]": Manual
        "CODE_SIGN_IDENTITY[sdk=macosx*]": Apple Development
        "DEVELOPMENT_TEAM[sdk=macosx*]": 7FKUS5M5QS
        "CODE_SIGN_STYLE[sdk=iphoneos*]": Automatic
        "CODE_SIGN_IDENTITY[sdk=iphoneos*]": Apple Development
        "DEVELOPMENT_TEAM[sdk=iphoneos*]": 7FKUS5M5QS

  HarnessTests:
    type: bundle.unit-test
    supportedDestinations: [macOS, iOS]
    sources:
      - Tests/HarnessTests
    dependencies:
      - target: Harness
      - package: OntologyKit
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGNING_ALLOWED: NO
        "TEST_HOST[sdk=macosx*]": "$(BUILT_PRODUCTS_DIR)/Harness.app/Contents/MacOS/Harness"
        "BUNDLE_LOADER[sdk=macosx*]": "$(TEST_HOST)"

schemes:
  Harness:
    build:
      targets:
        Harness: all
    run:
      config: Debug
      debugEnabled: false
    test:
      targets:
        - HarnessTests
