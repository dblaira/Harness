name: Verification

on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review, edited]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: verification-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  gate-script-tests:
    name: Protected gate-script verifier
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Check out protected-base adversarial tests
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ github.event.pull_request.base.sha || github.sha }}
          path: trusted-base
          persist-credentials: false
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          path: proposed
          fetch-depth: 0
          persist-credentials: false
      - name: Run protected adversarial tests against proposed validators
        run: >-
          python3 trusted-base/scripts/run_gate_script_tests.py
          --tests trusted-base/scripts/tests/test_gates.py
          --proposal-scripts proposed/scripts
          --output "$RUNNER_TEMP/gate-test-report.json"
      - name: Upload protected test inventory
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: gate-test-report-${{ github.event.pull_request.head.sha || github.sha }}
          path: ${{ runner.temp }}/gate-test-report.json
  validate-gate-script-evidence:
    name: Fresh protected gate evidence verifier
    if: always() && (github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository)
    needs: gate-script-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ github.event.pull_request.base.sha || github.sha }}
          persist-credentials: false
      - uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5
        with:
          name: gate-test-report-${{ github.event.pull_request.head.sha || github.sha }}
          path: ${{ runner.temp }}/gate-evidence
      - run: >-
          python3 scripts/validate_gate_test_report.py
          --report "$RUNNER_TEMP/gate-evidence/gate-test-report.json"
  publish-gate-script-verdict:
    name: Publish gate-script verdict
    if: always() && github.event_name == 'pull_request_target' && github.event.pull_request.head.repo.full_name == github.repository
    needs: validate-gate-script-evidence
    runs-on: ubuntu-latest
    permissions:
      contents: read
      statuses: write
    steps:
      - name: Publish exact-head gate-script verdict
        env:
          GH_TOKEN: ${{ github.token }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          STATE: ${{ needs.validate-gate-script-evidence.result == 'success' && 'success' || 'failure' }}
        run: >-
          gh api -X POST "repos/$GITHUB_REPOSITORY/statuses/$HEAD_SHA"
          -f state="$STATE" -f context='Gate script tests'
          -f description="Protected tests against proposed validators: $STATE"
          -f target_url="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"

  macos-verification:
    name: Protected macOS verifier
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: macos-latest
    steps:
      - name: Check out protected-base controls
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ github.event.pull_request.base.sha || github.sha }}
          path: trusted-base
          persist-credentials: false
      - name: Preserve protected controls outside the proposal
        run: |
          mkdir -p "$RUNNER_TEMP/gate-controls"
          cp trusted-base/scripts/lint_changed_swift.sh "$RUNNER_TEMP/gate-controls/"
          cp trusted-base/scripts/periphery_changed_gate.py "$RUNNER_TEMP/gate-controls/"
          cp trusted-base/scripts/validate_xcresult.py "$RUNNER_TEMP/gate-controls/"
          cp trusted-base/scripts/verify_running_app.swift "$RUNNER_TEMP/gate-controls/"
          cp trusted-base/.swiftlint.yml "$RUNNER_TEMP/gate-controls/swiftlint.yml"
          cp trusted-base/.periphery.yml "$RUNNER_TEMP/gate-controls/periphery.yml"
      - name: Check out exact proposed revision
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          path: proposed
          fetch-depth: 0
          persist-credentials: false
      - name: Install gate tools
        run: brew install xcodegen swiftlint periphery
      - name: Generate project
        working-directory: proposed
        run: xcodegen generate
      - name: Prove accessibility element and window stay bound
        run: xcrun swift "$RUNNER_TEMP/gate-controls/verify_running_app.swift" --self-test-window-binding
      - name: SwiftLint changed Swift files
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
          SWIFTLINT_CONFIG: ${{ runner.temp }}/gate-controls/swiftlint.yml
        working-directory: proposed
        run: >-
          "$RUNNER_TEMP/gate-controls/lint_changed_swift.sh" "$BASE_SHA"
      - name: Periphery changed-code gate
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
        working-directory: proposed
        run: >-
          python3 "$RUNNER_TEMP/gate-controls/periphery_changed_gate.py"
          --base "$BASE_SHA" --output "$RUNNER_TEMP/periphery.json"
          --config "$RUNNER_TEMP/gate-controls/periphery.yml"
      - name: OntologyKit deterministic tests
        run: |
          swift test --package-path trusted-base/Packages/OntologyKit list > "$RUNNER_TEMP/ontology-protected-list.txt"
          python3 trusted-base/scripts/validate_swiftpm_tests.py \
            --listing "$RUNNER_TEMP/ontology-protected-list.txt" \
            --write-inventory "$RUNNER_TEMP/ontology-protected-inventory.json"
          set -o pipefail
          swift test --package-path proposed/Packages/OntologyKit \
            --skip satisfactionGateAdamRealQuestionGetsCompleteAnswer \
            2>&1 | tee "$RUNNER_TEMP/ontology-tests.log"
          python3 trusted-base/scripts/validate_swiftpm_tests.py \
            --expected "$RUNNER_TEMP/ontology-protected-inventory.json" \
            --transcript "$RUNNER_TEMP/ontology-tests.log" \
            --allow-missing OntologyKitTests.satisfactionGateAdamRealQuestionGetsCompleteAnswer
      - name: Require live satisfaction proof in signed handoff
        run: |
          echo 'The live Ollama + Fuseki satisfaction test is intentionally excluded here.'
          echo "Signed Mac handoff is a protected required status and runs it fail-closed on Adam's Mac."
      - name: Harness macOS unit tests
        working-directory: proposed
        run: |
          python3 ../trusted-base/scripts/swift_test_inventory.py \
            --source-root ../trusted-base/Tests/HarnessTests \
            --output "$RUNNER_TEMP/protected-test-inventory.json"
          xcodebuild test \
            -project Harness.xcodeproj \
            -scheme HarnessUnitVerification \
            -destination 'platform=macOS' \
            -derivedDataPath .build/ci \
            -resultBundlePath "$RUNNER_TEMP/HarnessTests.xcresult" \
            -only-testing:HarnessTests \
            CODE_SIGNING_ALLOWED=NO
      - name: Reject empty, failed, or skipped macOS test evidence
        run: >-
          python3 "$RUNNER_TEMP/gate-controls/validate_xcresult.py"
          --xcresult "$RUNNER_TEMP/HarnessTests.xcresult"
          --required-bundle HarnessTests
          --required-test-list "$RUNNER_TEMP/protected-test-inventory.json"
      - name: Preserve test and static-analysis evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: macos-verification-${{ github.event.pull_request.head.sha || github.sha }}
          path: |
            ${{ runner.temp }}/HarnessTests.xcresult
            ${{ runner.temp }}/periphery.json
            ${{ runner.temp }}/protected-test-inventory.json
            ${{ runner.temp }}/ontology-protected-inventory.json
            ${{ runner.temp }}/ontology-tests.log
  validate-macos-evidence:
    name: Fresh protected macOS evidence verifier
    if: always() && (github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository)
    needs: macos-verification
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ github.event.pull_request.base.sha || github.sha }}
          persist-credentials: false
      - uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5
        with:
          name: macos-verification-${{ github.event.pull_request.head.sha || github.sha }}
          path: ${{ runner.temp }}/macos-evidence
      - name: Validate raw evidence with fresh protected controls
        run: |
          swift test --package-path Packages/OntologyKit list > "$RUNNER_TEMP/fresh-ontology-list.txt"
          python3 scripts/validate_swiftpm_tests.py \
            --listing "$RUNNER_TEMP/fresh-ontology-list.txt" \
            --write-inventory "$RUNNER_TEMP/fresh-ontology-inventory.json"
          python3 scripts/validate_swiftpm_tests.py \
            --expected "$RUNNER_TEMP/fresh-ontology-inventory.json" \
            --transcript "$RUNNER_TEMP/macos-evidence/ontology-tests.log" \
            --allow-missing OntologyKitTests.satisfactionGateAdamRealQuestionGetsCompleteAnswer
          python3 scripts/swift_test_inventory.py \
            --source-root Tests/HarnessTests \
            --output "$RUNNER_TEMP/fresh-protected-test-inventory.json"
          python3 scripts/validate_xcresult.py \
            --xcresult "$RUNNER_TEMP/macos-evidence/HarnessTests.xcresult" \
            --required-bundle HarnessTests \
            --required-test-list "$RUNNER_TEMP/fresh-protected-test-inventory.json"
          python3 scripts/validate_periphery_report.py \
            --report "$RUNNER_TEMP/macos-evidence/periphery.json"
  publish-macos-verdict:
    name: Publish macOS verdict
    if: always() && github.event_name == 'pull_request_target' && github.event.pull_request.head.repo.full_name == github.repository
    needs: validate-macos-evidence
    runs-on: ubuntu-latest
    permissions:
      contents: read
      statuses: write
    steps:
      - name: Publish exact-head macOS verdict
        env:
          GH_TOKEN: ${{ github.token }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          STATE: ${{ needs.validate-macos-evidence.result == 'success' && 'success' || 'failure' }}
        run: >-
          gh api -X POST "repos/$GITHUB_REPOSITORY/statuses/$HEAD_SHA"
          -f state="$STATE" -f context='macOS tests, SwiftLint, Periphery'
          -f description="Protected macOS verification of exact head: $STATE"
          -f target_url="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
