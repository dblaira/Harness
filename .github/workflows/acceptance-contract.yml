name: Trusted Acceptance Contract

on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  statuses: write

concurrency:
  group: acceptance-contract-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  acceptance-contract:
    name: Acceptance contract workflow
    runs-on: ubuntu-latest
    steps:
      - name: Check out validator from protected base
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          persist-credentials: false
      - name: Validate literal requirement and proof plan
        env:
          GH_TOKEN: ${{ github.token }}
          HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          [[ "$HEAD_REPO" == "$GITHUB_REPOSITORY" ]] || {
            echo 'Fork pull requests are not accepted for this signed local release workflow.' >&2
            exit 1
          }
          gh api "repos/$HEAD_REPO/contents/.github/acceptance-contract.json?ref=$HEAD_SHA" \
            --jq .content | tr -d '\n' | base64 --decode > "$RUNNER_TEMP/acceptance-contract.json"
          python3 scripts/validate_acceptance_contract.py \
            --contract-json "$RUNNER_TEMP/acceptance-contract.json" \
            --repo "$GITHUB_REPOSITORY" \
            --pr-number "$PR_NUMBER" \
            --base-sha "$BASE_SHA"
      - name: Publish commit-bound acceptance verdict
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          STATE: ${{ job.status == 'success' && 'success' || 'failure' }}
        run: |
          gh api -X POST "repos/$GITHUB_REPOSITORY/statuses/$HEAD_SHA" \
            -f state="$STATE" \
            -f context='Acceptance contract' \
            -f description="Protected-base acceptance validation: $STATE" \
            -f target_url="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
          if [[ "$STATE" != success ]]; then
            for CONTEXT in 'GPT-5.6 Sol review' 'Signed Mac handoff'; do
              gh api -X POST "repos/$GITHUB_REPOSITORY/statuses/$HEAD_SHA" \
                -f state=pending \
                -f context="$CONTEXT" \
                -f description='Committed acceptance contract changed; fresh local evidence required' \
                -f target_url="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/pull/${{ github.event.pull_request.number }}"
            done
          fi
